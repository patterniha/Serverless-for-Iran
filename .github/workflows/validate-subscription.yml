name: Validate subscription

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install json5

      - name: Generate subscriptions
        run: python Generate-subscription.py

      - name: Generated files must be committed
        run: |
          git diff --exit-code -- \
            Subscription/Serverless-for-Iran.json \
            Subscription/Serverless-for-Iran-full.json \
            Subscription/profiles-manifest.json

      - name: Parse JSON
        run: |
          python -m json.tool Subscription/Serverless-for-Iran.json >/dev/null
          python -m json.tool Subscription/Serverless-for-Iran-full.json >/dev/null
          python -m json.tool Subscription/profiles-manifest.json >/dev/null

      - name: Semantic validation
        run: |
          python scripts/validate_subscription.py \
            Subscription/Serverless-for-Iran.json \
            Subscription/Serverless-for-Iran-full.json \
            Subscription/profiles-manifest.json
