name: Validate subscription

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install json5

      - name: Generate subscriptions
        run: |
          python Generate-subscription.py

      - name: Validate generated JSON (curated)
        run: |
          python -m json.tool Subscription/Serverless-for-Iran.json > /dev/null

      - name: Validate generated JSON (full)
        run: |
          python -m json.tool Subscription/Serverless-for-Iran-full.json > /dev/null
